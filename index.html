<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ UI/UX 设计作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --deep-blue: #0a0e27;
            --mid-blue: #121a40;
            --accent-blue: #1e3a8a;
            --light-blue: #3b82f6;
            --glow-blue: #60a5fa;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--deep-blue);
            color: var(--text-primary);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* 粒子背景 Canvas */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 页面容器 */
        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .page.active {
            display: flex;
            opacity: 1;
        }

        /* 首页 */
        #home-page {
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 顶部导航 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-area img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 2px;
        }

        .nav-tabs {
            display: flex;
            gap: 16px;
        }

        .nav-tab {
            padding: 10px 24px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 30px;
            background: rgba(30, 58, 138, 0.2);
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
        }

        .nav-tab:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: var(--light-blue);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }

        /* 首页欢迎语 */
        .welcome-text {
            font-size: 72px;
            font-weight: 700;
            letter-spacing: 8px;
            color: var(--text-primary);
            text-align: center;
            text-shadow: 0 0 40px rgba(59, 130, 246, 0.5);
            animation: fadeInUp 1.2s ease-out;
        }

        .welcome-sub {
            margin-top: 16px;
            font-size: 16px;
            color: var(--text-secondary);
            letter-spacing: 4px;
            animation: fadeInUp 1.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 左下角访问人数 */
        .visitor-count {
            position: fixed;
            bottom: 32px;
            left: 48px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
            animation: fadeInUp 1.8s ease-out;
        }

        .visitor-count img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            opacity: 0.8;
        }

        .visitor-count span {
            font-size: 14px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* 头像区域 */
        .avatar-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 48px;
            animation: fadeInUp 0.9s ease-out;
        }

        .avatar-section img {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 24px rgba(59, 130, 246, 0.25);
        }

        .avatar-text {
            font-size: 36px;
            font-weight: 300;
            color: var(--text-primary);
            letter-spacing: 4px;
        }

        /* 音乐播放器 */
        .music-player {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(30, 58, 138, 0.3);
            border: 1px solid rgba(59, 130, 246, 0.3);
            z-index: 10;
            backdrop-filter: blur(10px);
            animation: fadeInUp 1.8s ease-out;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .music-player:hover {
            background: rgba(59, 130, 246, 0.4);
            border-color: var(--light-blue);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }

        .music-player .play-btn {
            width: 20px;
            height: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
        }

        .music-player .song-name {
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* 右下角联系我 */
        .contact-btn {
            position: fixed;
            bottom: 32px;
            right: 48px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
            cursor: pointer;
            padding: 12px 20px;
            border-radius: 30px;
            background: rgba(30, 58, 138, 0.3);
            border: 1px solid rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
            animation: fadeInUp 1.8s ease-out;
            backdrop-filter: blur(10px);
        }

        .contact-btn:hover {
            background: rgba(59, 130, 246, 0.4);
            border-color: var(--light-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }

        .contact-btn img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .contact-btn span {
            font-size: 14px;
            color: var(--text-primary);
            letter-spacing: 2px;
        }

        /* 分类页 */
        #category-page {
            flex-direction: column;
            padding-top: 100px;
        }

        .category-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            z-index: 10;
            background: rgba(10, 14, 39, 0.8);
            backdrop-filter: blur(10px);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 30px;
            background: rgba(30, 58, 138, 0.2);
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .back-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: var(--light-blue);
            color: var(--text-primary);
        }

        .category-title {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            color: var(--text-primary);
        }

        /* 横向滚动容器 */
        .scroll-container {
            flex: 1;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
            width: 100%;
        }

        .scroll-track {
            display: flex;
            gap: 40px;
            padding: 0 20px;
        }

        .scroll-track.running {
            animation: scrollLoop 30s linear infinite;
        }

        .scroll-track.running:hover {
            animation-play-state: paused;
        }

        @keyframes scrollLoop {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        .work-item {
            flex-shrink: 0;
            width: 320px;
            height: 220px;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(59, 130, 246, 0.2);
            transition: all 0.4s ease;
            background: var(--mid-blue);
        }

        .work-item:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--light-blue);
            box-shadow: 0 12px 40px rgba(59, 130, 246, 0.3);
        }

        .work-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            z-index: 2;
        }

        .work-item:hover img {
            transform: scale(1.05);
        }

        .work-item-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--mid-blue), var(--accent-blue));
            color: var(--text-primary);
            font-size: 14px;
            z-index: 1;
        }

        .work-item-placeholder .ph-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .work-item-placeholder .ph-desc {
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* 灯箱 */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* 联系卡片缩小到0.5倍 */
        #contact-lightbox .lightbox-content img {
            max-width: 45%;
            max-height: 42.5vh;
        }

        .lightbox-close {
            position: absolute;
            top: -40px;
            right: 0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .top-nav {
                flex-direction: column;
                gap: 16px;
                padding: 16px 24px;
            }

            .nav-tabs {
                flex-wrap: wrap;
                justify-content: center;
            }

            .nav-tab {
                padding: 8px 16px;
                font-size: 12px;
            }

            .welcome-text {
                font-size: 56px;
                letter-spacing: 4px;
            }

            .visitor-count {
                left: 24px;
                bottom: 24px;
            }

            .visitor-count img {
                width: 40px;
                height: 40px;
            }

            .contact-btn {
                right: 24px;
                bottom: 24px;
            }

            .music-player {
                bottom: 24px;
                padding: 6px 12px;
            }

            .avatar-section {
                margin-bottom: 32px;
            }

            .avatar-section img {
                width: 56px;
                height: 56px;
            }

            .avatar-text {
                font-size: 28px;
            }

            .work-item {
                width: 260px;
                height: 180px;
            }

            .category-header {
                padding: 16px 24px;
            }

            /* 移动端联系卡片不缩太小 */
            #contact-lightbox .lightbox-content img {
                max-width: 90%;
                max-height: 70vh;
            }
        }
    </style>
</head>
<body>

    <!-- 粒子背景 -->
    <canvas id="particle-canvas"></canvas>

    <!-- 首页 -->
    <div id="home-page" class="page active">
        <div class="top-nav">
            <div class="logo-area">
                <img src="images/logo.png" alt="Logo">
                <span class="logo-text">UI/UX 设计</span>
            </div>
            <div class="nav-tabs">
                <button class="nav-tab" data-category="mobile">移动端</button>
                <button class="nav-tab" data-category="web">Web</button>
                <button class="nav-tab" data-category="visual">可视化</button>
                <button class="nav-tab" data-category="illustration">插画</button>
                <button class="nav-tab" data-category="simulation">虚拟仿真</button>
                <button class="nav-tab" data-category="aigc">AIGC</button>
            </div>
        </div>

        <div class="avatar-section">
            <img src="images/avatar.png" alt="头像">
            <span class="avatar-text">您好，我是黄琼。</span>
        </div>

        <div class="welcome-text">欢迎来到我的作品集</div>
        <div class="welcome-sub">Welcome to My Portfolio</div>

        <div class="visitor-count">
            <img src="images/peopleicon.png" alt="访客">
            <span>146 人来过</span>
        </div>

        <div class="music-player" id="music-player">
            <div class="play-btn" id="play-btn">
                <svg id="play-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <svg id="pause-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </div>
            <span class="song-name">don't make me a postcard</span>
            <audio id="bg-music" loop>
                <source src="images/background.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="contact-btn" id="contact-btn">
            <img src="images/contact.png" alt="联系">
            <span>与我联系</span>
        </div>
    </div>

    <!-- 分类页 -->
    <div id="category-page" class="page">
        <div class="category-header">
            <button class="back-btn" id="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                返回首页
            </button>
            <div class="category-title" id="category-title">分类</div>
            <div style="width: 100px;"></div>
        </div>

        <div class="scroll-container">
            <div class="scroll-track" id="scroll-track">
                <!-- 作品项由 JS 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 联系灯箱 -->
    <div class="lightbox" id="contact-lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" id="contact-close">&times;</button>
            <img src="images/mission.png" alt="联系方式">
        </div>
    </div>

    <!-- 详情灯箱 -->
    <div class="lightbox" id="detail-lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" id="detail-close">&times;</button>
            <img id="detail-img" src="" alt="作品详情">
        </div>
    </div>

    <script>
        // =====================
        // 粒子背景动画
        // =====================
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.5 + 0.3;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(96, 165, 250, ${this.opacity})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.min(120, Math.floor((canvas.width * canvas.height) / 10000));
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(96, 165, 250, ${0.15 * (1 - dist / 150)})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制渐变背景
            const gradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, canvas.width * 0.8
            );
            gradient.addColorStop(0, '#0f1a4a');
            gradient.addColorStop(1, '#0a0e27');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawLines();
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            animationId = requestAnimationFrame(animateParticles);
        }

        resizeCanvas();
        initParticles();
        animateParticles();

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        // =====================
        // 作品数据配置
        // 缩略图路径: images/thumbnails/<分类>/1.jpg ~ 6.jpg
        // 详情图路径: images/details/<分类>/1.jpg ~ 6.jpg
        // =====================
        const categories = {
            mobile: {
                title: '移动端',
                works: [
                    { thumb: 'images/thumbnails/mobile/1.jpg', detail: 'images/details/mobile/1.jpg', name: 'App 界面 1' },
                    { thumb: 'images/thumbnails/mobile/2.jpg', detail: 'images/details/mobile/2.jpg', name: 'App 界面 2' },
                    { thumb: 'images/thumbnails/mobile/3.jpg', detail: 'images/details/mobile/3.jpg', name: 'App 界面 3' },
                    { thumb: 'images/thumbnails/mobile/4.jpg', detail: 'images/details/mobile/4.jpg', name: 'App 界面 4' },
                    { thumb: 'images/thumbnails/mobile/5.jpg', detail: 'images/details/mobile/5.jpg', name: 'App 界面 5' },
                ]
            },
            web: {
                title: 'Web',
                works: [
                    { thumb: 'images/thumbnails/web/1.jpg', detail: 'images/details/web/1.jpg', name: 'Web 页面 1' },
                    { thumb: 'images/thumbnails/web/2.jpg', detail: 'images/details/web/2.jpg', name: 'Web 页面 2' },
                    { thumb: 'images/thumbnails/web/3.jpg', detail: 'images/details/web/3.jpg', name: 'Web 页面 3' },
                    { thumb: 'images/thumbnails/web/4.jpg', detail: 'images/details/web/4.jpg', name: 'Web 页面 4' },
                    { thumb: 'images/thumbnails/web/5.jpg', detail: 'images/details/web/5.jpg', name: 'Web 页面 5' },
                ]
            },
            visual: {
                title: '可视化',
                works: [
                    { thumb: 'images/thumbnails/visual/1.jpg', detail: 'images/details/visual/1.jpg', name: '数据可视化 1' },
                    { thumb: 'images/thumbnails/visual/2.jpg', detail: 'images/details/visual/2.jpg', name: '数据可视化 2' },
                    { thumb: 'images/thumbnails/visual/3.jpg', detail: 'images/details/visual/3.jpg', name: '数据可视化 3' },
                    { thumb: 'images/thumbnails/visual/4.jpg', detail: 'images/details/visual/4.jpg', name: '数据可视化 4' },
                    { thumb: 'images/thumbnails/visual/5.jpg', detail: 'images/details/visual/5.jpg', name: '数据可视化 5' },
                ]
            },
            illustration: {
                title: '插画',
                works: [
                    { thumb: 'images/thumbnails/illustration/1.jpg', detail: 'images/details/illustration/1.jpg', name: '插画作品 1' },
                    { thumb: 'images/thumbnails/illustration/2.jpg', detail: 'images/details/illustration/2.jpg', name: '插画作品 2' },
                    { thumb: 'images/thumbnails/illustration/3.jpg', detail: 'images/details/illustration/3.jpg', name: '插画作品 3' },
                ]
            },
            simulation: {
                title: '虚拟仿真',
                works: [
                    { thumb: 'images/thumbnails/simulation/1.jpg', detail: 'images/details/simulation/1.jpg', name: '虚拟仿真 1' },
                    { thumb: 'images/thumbnails/simulation/2.jpg', detail: 'images/details/simulation/2.jpg', name: '虚拟仿真 2' },
                    { thumb: 'images/thumbnails/simulation/3.jpg', detail: 'images/details/simulation/3.jpg', name: '虚拟仿真 3' },
                    { thumb: 'images/thumbnails/simulation/4.jpg', detail: 'images/details/simulation/4.jpg', name: '虚拟仿真 4' },
                    { thumb: 'images/thumbnails/simulation/5.jpg', detail: 'images/details/simulation/5.jpg', name: '虚拟仿真 5' },
                ]
            },
            aigc: {
                title: 'AIGC',
                works: [
                    { thumb: 'images/thumbnails/aigc/1.jpg', detail: 'images/details/aigc/1.jpg', name: 'AIGC 作品 1' },
                    { thumb: 'images/thumbnails/aigc/2.jpg', detail: 'images/details/aigc/2.jpg', name: 'AIGC 作品 2' },
                    { thumb: 'images/thumbnails/aigc/3.jpg', detail: 'images/details/aigc/3.jpg', name: 'AIGC 作品 3' },
                    { thumb: 'images/thumbnails/aigc/4.jpg', detail: 'images/details/aigc/4.jpg', name: 'AIGC 作品 4' },
                ]
            }
        };

        // =====================
        // 页面切换
        // =====================
        const homePage = document.getElementById('home-page');
        const categoryPage = document.getElementById('category-page');
        const categoryTitle = document.getElementById('category-title');
        const scrollTrack = document.getElementById('scroll-track');

        let currentWorks = [];

        // 事件委托：点击缩略图查看详情（只绑定一次，cloneNode 副本也能响应）
        scrollTrack.addEventListener('click', (e) => {
            const workItem = e.target.closest('.work-item');
            if (!workItem) return;
            const index = parseInt(workItem.dataset.index);
            const work = currentWorks[index];
            if (work) {
                showDetail(work.detail);
            }
        });

        function createWorkItem(work, index) {
            const div = document.createElement('div');
            div.className = 'work-item';
            div.dataset.index = index;
            div.innerHTML = `
                <div class="work-item-placeholder">
                    <div class="ph-title">${work.name}</div>
                    <div class="ph-desc">点击预览详情</div>
                </div>
                <img src="${work.thumb}" alt="${work.name}" onerror="this.style.display='none'">
            `;
            return div;
        }

        function showCategory(categoryKey) {
            const category = categories[categoryKey];
            if (!category) return;

            currentWorks = category.works;
            categoryTitle.textContent = category.title;
            scrollTrack.innerHTML = '';

            // 生成作品项
            category.works.forEach((work, index) => {
                scrollTrack.appendChild(createWorkItem(work, index));
            });

            // 复制一份实现无缝循环
            category.works.forEach((work, index) => {
                scrollTrack.appendChild(createWorkItem(work, index));
            });

            // 重置动画（用 class 控制，避免内联样式覆盖 :hover）
            scrollTrack.classList.remove('running');
            scrollTrack.offsetHeight; // 触发重排
            scrollTrack.classList.add('running');

            homePage.classList.remove('active');
            setTimeout(() => {
                categoryPage.classList.add('active');
            }, 300);
        }

        function showHome() {
            categoryPage.classList.remove('active');
            setTimeout(() => {
                homePage.classList.add('active');
            }, 300);
        }

        // 导航按钮点击
        document.querySelectorAll('.nav-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                const category = btn.dataset.category;
                showCategory(category);
            });
        });

        // 返回按钮
        document.getElementById('back-btn').addEventListener('click', showHome);

        // =====================
        // 灯箱控制
        // =====================
        const contactLightbox = document.getElementById('contact-lightbox');
        const detailLightbox = document.getElementById('detail-lightbox');
        const detailImg = document.getElementById('detail-img');

        // 联系灯箱
        document.getElementById('contact-btn').addEventListener('click', () => {
            contactLightbox.classList.add('active');
        });

        document.getElementById('contact-close').addEventListener('click', () => {
            contactLightbox.classList.remove('active');
        });

        contactLightbox.addEventListener('click', (e) => {
            if (e.target === contactLightbox) {
                contactLightbox.classList.remove('active');
            }
        });

        // 详情灯箱
        function showDetail(src) {
            detailImg.src = src;
            detailLightbox.classList.add('active');
        }

        document.getElementById('detail-close').addEventListener('click', () => {
            detailLightbox.classList.remove('active');
        });

        detailLightbox.addEventListener('click', (e) => {
            if (e.target === detailLightbox) {
                detailLightbox.classList.remove('active');
            }
        });

        // ESC 关闭灯箱
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                contactLightbox.classList.remove('active');
                detailLightbox.classList.remove('active');
            }
        });

        // =====================
        // 音乐播放器
        // =====================
        const musicPlayer = document.getElementById('music-player');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const bgMusic = document.getElementById('bg-music');
        let isPlaying = false;

        playBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isPlaying) {
                bgMusic.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            } else {
                bgMusic.play().catch(() => {});
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            }
            isPlaying = !isPlaying;
        });

        musicPlayer.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            } else {
                bgMusic.play().catch(() => {});
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            }
            isPlaying = !isPlaying;
        });
    </script>
</body>
</html>
